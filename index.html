<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Stellar Data V15</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC";
}

body{
background:radial-gradient(circle at top,#0b1224,#050814 60%);
color:#fff;
overflow-x:hidden;
}

/* ===== 启动页 ===== */
#boot{
position:fixed;
inset:0;
background:#050814;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
transition:.6s;
}

.logo{
font-size:28px;
background:linear-gradient(90deg,#fff,#7dd3ff,#c084fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.loader{
width:40px;
height:40px;
border:3px solid rgba(255,255,255,.1);
border-top:3px solid #7dd3ff;
border-radius:50%;
margin-top:15px;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

/* ===== 背景 ===== */
canvas{
position:fixed;
inset:0;
z-index:0;
opacity:.8;
}

/* ===== 布局 ===== */
section{
position:relative;
z-index:2;
max-width:900px;
margin:40px auto;
padding:20px;
}

.card{
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.12);
backdrop-filter:blur(20px);
padding:20px;
border-radius:16px;
margin-bottom:20px;
animation:fade .4s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
background:rgba(255,255,255,.06);
color:#fff;
}

button{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:10px;
font-weight:bold;
}

.wx{background:#00ffa3}
.ali{background:#00c6ff}

/* ===== 弹窗 ===== */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.box{
background:#0f1428;
padding:20px;
border-radius:16px;
width:90%;
max-width:520px;
animation:pop .25s ease;
}

@keyframes pop{
from{transform:scale(.9);opacity:0;}
to{transform:scale(1);opacity:1;}
}

/* QR */
.qr{
width:200px;
height:200px;
border-radius:12px;
margin-top:10px;
}

/* status */
.status{
opacity:.7;
font-size:13px;
margin-top:8px;
}

/* r */
.rmark{
position:fixed;
left:10px;
bottom:10px;
font-size:12px;
opacity:.5;
}
</style>
</head>

<body>

<!-- ===== 启动 ===== -->
<div id="boot">
<div class="logo">Stellar Data</div>
<div class="loader"></div>
<p style="opacity:.6;margin-top:10px">loading...</p>
</div>

<canvas id="bg"></canvas>

<!-- ===== 订单 ===== -->
<section>
<div class="card">
<h2>创建订单</h2>
<input id="money" placeholder="输入金额（1-10000000）">

<select id="type">
<option value="wechat">微信支付</option>
<option value="alipay">支付宝支付</option>
</select>

<button class="ali" onclick="createOrder()">生成订单</button>
</div>
</section>

<!-- ===== 退款 ===== -->
<section>
<div class="card">
<h2>退款 / 售后</h2>
<input placeholder="订单号">
<input placeholder="金额">
<textarea placeholder="原因"></textarea>
<input type="file">
<button class="wx">提交申请</button>
</div>
</section>

<!-- ===== 弹窗 ===== -->
<div class="modal" id="modal">
<div class="box" id="box"></div>
</div>

<div class="rmark">© Stellar Data V15</div>

<script>

/* ===== 启动（绝对不会卡） ===== */
window.onload=function(){
const boot=document.getElementById("boot");
setTimeout(()=>{
boot.style.opacity="0";
setTimeout(()=>boot.style.display="none",400);
},900);
};

/* ===== 粒子背景 ===== */
const c=document.getElementById("bg");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<80;i++){
p.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="rgba(255,255,255,.4)";
p.forEach(o=>{
ctx.beginPath();
ctx.arc(o.x,o.y,1.2,0,Math.PI*2);
ctx.fill();
o.y+=0.4;
if(o.y>c.height){
o.y=0;
o.x=Math.random()*c.width;
}
});
requestAnimationFrame(draw);
}
draw();

/* ===== 收款码（替换这里） ===== */
const wxQR="https://i.postimg.cc/yxmXW85V/IMG-2493.jpg";
const aliQR="https://i.postimg.cc/hGY05wTB/IMG-2492.jpg";

/* ===== 数据 ===== */
let orderId="",money=0,type="";

/* ===== 创建订单 ===== */
function createOrder(){

money=parseFloat(document.getElementById("money").value);
type=document.getElementById("type").value;

if(isNaN(money)||money<1||money>10000000){
alert("金额错误");
return;
}

orderId="SD"+Date.now();

show(`
<h2>订单已生成</h2>
<p>订单号：${orderId}</p>
<p>金额：￥${money}</p>

<button class="wx" onclick="pay()">进入支付</button>
`);
}

/* ===== 支付页 ===== */
function pay(){

let qr = type==="wechat"?wxQR:aliQR;

show(`
<h2>扫码支付</h2>
<img class="qr" src="${qr}">
<p class="status">请使用对应APP扫码</p>

<button class="ali" onclick="verify()">我已支付</button>
`);
}

/* ===== 验证 ===== */
function verify(){

show(`
<h2>支付验证中</h2>
<p class="status">系统正在确认支付信息...</p>

<h3>联系方式</h3>
<input id="contact" placeholder="邮箱/微信/手机号">

<button class="wx" onclick="result()">提交</button>
`);
}

/* ===== 结果 ===== */
function result(){

let code="VIP-"+Math.floor(Math.random()*999999);
let contact=document.getElementById("contact").value;

show(`
<h2>订单完成</h2>
<p>订单号：${orderId}</p>
<p>凭证：${code}</p>
<p class="status">已记录：${contact || "未填写"}</p>
`);
}

/* ===== modal ===== */
function show(html){
modal.style.display="flex";
box.innerHTML=html;
}

</script>

</body>
</html>
